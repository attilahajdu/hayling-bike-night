name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build:web
        env:
          AUTH_SECRET: ci-build-secret-at-least-32-chars-long
          STRAPI_URL: http://127.0.0.1:1337
